<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="570" viewBox="0 0 1200 570" role="img" aria-labelledby="title desc"><title id="title">Project surface snapshots</title><desc id="desc">Inventory, software assurance, and live-command status cards use different units and no shared quantitative axis.</desc><style>text{font-family:Inter,ui-sans-serif,system-ui,-apple-system,sans-serif;fill:#172033}.title{font-size:28px;font-weight:760}.sub{font-size:14px;fill:#536075}.label{font-size:17px;font-weight:700}.value{font-size:25px;font-weight:780}.meta{font-size:12px;fill:#536075}.status{font-size:12px;font-weight:700}.card{fill:#f8fafc;stroke:#dce3ec}.track{fill:#e7edf5}.bar{fill:#2563eb}.cyan{fill:#0891b2}.amber{fill:#d97706}</style><rect width="1200" height="570" fill="#fff"/><text class="title" x="40" y="48">Project surface snapshots</text><text class="sub" x="40" y="77">Inventory cards, historical snapshots, and command availability are deliberately separated from effect charts.</text><rect class="card" x="40" y="120" width="350" height="160" rx="16"/><text class="label" x="62" y="158">HTTP endpoints</text><text class="value" x="62" y="202">51</text><text class="meta" x="62" y="228">endpoints · software assurance</text><text class="status" x="62" y="256">status: passing snapshot</text><rect class="card" x="420" y="120" width="350" height="160" rx="16"/><text class="label" x="442" y="158">Packages + apps</text><text class="value" x="442" y="202">41</text><text class="meta" x="442" y="228">directories · inventory</text><text class="status" x="442" y="256">status: inventory</text><rect class="card" x="800" y="120" width="350" height="160" rx="16"/><text class="label" x="822" y="158">Built-in MCP servers</text><text class="value" x="822" y="202">25</text><text class="meta" x="822" y="228">servers · inventory</text><text class="status" x="822" y="256">status: inventory</text><rect class="card" x="40" y="310" width="350" height="160" rx="16"/><text class="label" x="62" y="348">Provider families</text><text class="value" x="62" y="392">7</text><text class="meta" x="62" y="418">families · inventory</text><text class="status" x="62" y="446">status: inventory</text><rect class="card" x="420" y="310" width="350" height="160" rx="16"/><text class="label" x="442" y="348">Passing test cases</text><text class="value" x="442" y="392">18,484</text><text class="meta" x="442" y="418">test cases · software assurance</text><text class="status" x="442" y="446">status: passing snapshot</text><rect class="card" x="800" y="310" width="350" height="160" rx="16"/><text class="label" x="822" y="348">Real-LLM round-trip</text><text class="value" x="822" y="392">NOT_RUN</text><text class="meta" x="822" y="418">command availability · local-live agent capability</text><text class="status" x="822" y="446">status: NOT_RUN</text><text class="status" x="40" y="530">Different units · not comparable / not aggregatable · NOT_RUN is not a performance pass</text></svg>
