<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600" role="img" aria-labelledby="title desc"><title id="title">Project surface snapshots</title><desc id="desc">Inventory, software assurance, and live-command status cards use different units and no shared quantitative axis.</desc><style>text{font-family:Inter,ui-sans-serif,system-ui,-apple-system,sans-serif;fill:#172033}.title{font-size:28px;font-weight:760}.sub{font-size:14px;fill:#536075}.label{font-size:17px;font-weight:700}.value{font-size:25px;font-weight:780}.meta{font-size:12px;fill:#536075}.status{font-size:12px;font-weight:700}.footer{font-size:12px;font-weight:700;fill:#536075}.card,.row{fill:#f8fafc;stroke:#dce3ec}.track{fill:#e7edf5}.bar{fill:#2563eb}.cyan{fill:#0891b2}.purple{fill:#7c3aed}.amber{fill:#d97706}</style><rect width="1200" height="600" fill="#fff"/><text class="title" x="40" y="48">Project surface snapshots</text><text class="sub" x="40" y="77">Legend · cards use their own units · NOT_RUN is command status, not a performance pass</text><rect class="card" x="40" y="128" width="350" height="160" rx="16"/><text class="label" x="62" y="166">HTTP endpoints</text><text class="value" x="62" y="210">51</text><text class="meta" x="62" y="236">endpoints · software assurance</text><text class="status" x="62" y="264">status: passing snapshot</text><rect class="card" x="420" y="128" width="350" height="160" rx="16"/><text class="label" x="442" y="166">Packages + apps</text><text class="value" x="442" y="210">41</text><text class="meta" x="442" y="236">directories · inventory</text><text class="status" x="442" y="264">status: inventory</text><rect class="card" x="800" y="128" width="350" height="160" rx="16"/><text class="label" x="822" y="166">Built-in MCP servers</text><text class="value" x="822" y="210">25</text><text class="meta" x="822" y="236">servers · inventory</text><text class="status" x="822" y="264">status: inventory</text><rect class="card" x="40" y="318" width="350" height="160" rx="16"/><text class="label" x="62" y="356">Provider families</text><text class="value" x="62" y="400">7</text><text class="meta" x="62" y="426">families · inventory</text><text class="status" x="62" y="454">status: inventory</text><rect class="card" x="420" y="318" width="350" height="160" rx="16"/><text class="label" x="442" y="356">Passing test cases</text><text class="value" x="442" y="400">18,484</text><text class="meta" x="442" y="426">test cases · software assurance</text><text class="status" x="442" y="454">status: passing snapshot</text><rect class="card" x="800" y="318" width="350" height="160" rx="16"/><text class="label" x="822" y="356">Real-LLM round-trip</text><text class="value" x="822" y="400">NOT_RUN</text><text class="meta" x="822" y="426">command availability · local-live agent capability</text><text class="status" x="822" y="454">status: NOT_RUN</text><text class="footer" x="40" y="548">Different units · not comparable / not aggregatable · inventory and test volume are not effect evidence</text></svg>
