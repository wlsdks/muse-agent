<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc"><title id="title">Evidence coverage and boundaries</title><desc id="desc">Four ratio bars show numerator over each metric's own denominator. Rows have different evidence classes and are not comparable or aggregatable.</desc><style>text{font-family:Inter,ui-sans-serif,system-ui,-apple-system,sans-serif;fill:#172033}.title{font-size:28px;font-weight:760}.sub{font-size:14px;fill:#536075}.label{font-size:17px;font-weight:700}.value{font-size:25px;font-weight:780}.meta{font-size:12px;fill:#536075}.status{font-size:12px;font-weight:700}.footer{font-size:12px;font-weight:700;fill:#536075}.card,.row{fill:#f8fafc;stroke:#dce3ec}.track{fill:#e7edf5}.bar{fill:#2563eb}.cyan{fill:#0891b2}.purple{fill:#7c3aed}.amber{fill:#d97706}</style><rect width="1200" height="680" fill="#fff"/><text class="title" x="40" y="48">Evidence coverage and boundaries</text><text class="sub" x="40" y="77">Legend · bar = numerator ÷ its own denominator · row lengths have no shared meaning</text><text class="label" x="40" y="132">Agent capability axes</text><text class="value" x="1120" y="132" text-anchor="end">10/11</text><rect class="track" x="40" y="150" width="1080" height="20" rx="10"/><rect class="bar" x="40" y="150" width="981.8181818181818" height="20" rx="10"/><text class="meta" x="40" y="190">local-live agent capability</text><text class="status" x="1120" y="190" text-anchor="end">aggregate FAILED</text><text class="label" x="40" y="240">Raw top-4 pair retained</text><text class="value" x="1120" y="240" text-anchor="end">8/80</text><rect class="track" x="40" y="258" width="1080" height="20" rx="10"/><rect class="bar" x="40" y="258" width="108" height="20" rx="10"/><text class="meta" x="40" y="298">local-live retrieval component</text><text class="status" x="1120" y="298" text-anchor="end">diagnostic</text><text class="label" x="40" y="348">Provenance isolation</text><text class="value" x="1120" y="348" text-anchor="end">10,080/10,080</text><rect class="track" x="40" y="366" width="1080" height="20" rx="10"/><rect class="bar" x="40" y="366" width="1080" height="20" rx="10"/><text class="meta" x="40" y="406">controlled / synthetic</text><text class="status" x="1120" y="406" text-anchor="end">technical-only</text><text class="label" x="40" y="456">Organic classifications</text><text class="value" x="1120" y="456" text-anchor="end">0/1,000</text><rect class="track" x="40" y="474" width="1080" height="20" rx="10"/><rect class="bar" x="40" y="474" width="0" height="20" rx="10"/><text class="meta" x="40" y="514">organic personal effectiveness</text><text class="status" x="1120" y="514" text-anchor="end">NOT_PROVEN classification</text><text class="footer" x="40" y="620">Within-metric ratios only · not comparable / not aggregatable · synthetic scale is not organic effectiveness</text></svg>
