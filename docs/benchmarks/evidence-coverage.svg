<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="650" viewBox="0 0 1200 650" role="img" aria-labelledby="title desc"><title id="title">Evidence coverage and boundaries</title><desc id="desc">Four within-metric ratio bars with distinct denominators. Rows are not comparable or aggregatable.</desc><style>text{font-family:Inter,ui-sans-serif,system-ui,-apple-system,sans-serif;fill:#172033}.title{font-size:28px;font-weight:760}.sub{font-size:14px;fill:#536075}.label{font-size:17px;font-weight:700}.value{font-size:25px;font-weight:780}.meta{font-size:12px;fill:#536075}.status{font-size:12px;font-weight:700}.card{fill:#f8fafc;stroke:#dce3ec}.track{fill:#e7edf5}.bar{fill:#2563eb}.cyan{fill:#0891b2}.amber{fill:#d97706}</style><rect width="1200" height="650" fill="#fff"/><text class="title" x="40" y="48">Evidence coverage and boundaries</text><text class="sub" x="40" y="77">Each bar is scaled only to its own denominator; length across rows has no shared meaning.</text><text class="label" x="40" y="125">Agent capability axes</text><text class="value" x="1020" y="125" text-anchor="end">10/11</text><rect class="track" x="40" y="143" width="980" height="20" rx="10"/><rect class="bar" x="40" y="143" width="890.9090909090909" height="20" rx="10"/><text class="meta" x="40" y="183">local-live agent capability</text><text class="status" x="1020" y="183" text-anchor="end">aggregate FAILED</text><text class="label" x="40" y="230">Raw top-4 pair retained</text><text class="value" x="1020" y="230" text-anchor="end">8/80</text><rect class="track" x="40" y="248" width="980" height="20" rx="10"/><rect class="bar" x="40" y="248" width="98" height="20" rx="10"/><text class="meta" x="40" y="288">local-live retrieval component</text><text class="status" x="1020" y="288" text-anchor="end">diagnostic</text><text class="label" x="40" y="335">Provenance isolation</text><text class="value" x="1020" y="335" text-anchor="end">10,080/10,080</text><rect class="track" x="40" y="353" width="980" height="20" rx="10"/><rect class="bar" x="40" y="353" width="980" height="20" rx="10"/><text class="meta" x="40" y="393">controlled / synthetic</text><text class="status" x="1020" y="393" text-anchor="end">technical-only</text><text class="label" x="40" y="440">Organic classifications</text><text class="value" x="1020" y="440" text-anchor="end">0/1,000</text><rect class="track" x="40" y="458" width="980" height="20" rx="10"/><rect class="bar" x="40" y="458" width="0" height="20" rx="10"/><text class="meta" x="40" y="498">organic personal effectiveness</text><text class="status" x="1020" y="498" text-anchor="end">NOT_PROVEN classification</text><text class="status" x="40" y="610">Within-metric ratios only · not comparable / not aggregatable · synthetic scale is not organic effectiveness</text></svg>
