<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="580" viewBox="0 0 1200 580" role="img" aria-labelledby="title desc"><title id="title">Component effect deltas</title><desc id="desc">Three full-width rows show signed component deltas. Positive means better; each row has its own outcome scale and cannot be compared or aggregated.</desc><style>text{font-family:Inter,ui-sans-serif,system-ui,-apple-system,sans-serif;fill:#172033}.title{font-size:28px;font-weight:760}.sub{font-size:14px;fill:#536075}.label{font-size:17px;font-weight:700}.value{font-size:25px;font-weight:780}.meta{font-size:12px;fill:#536075}.status{font-size:12px;font-weight:700}.footer{font-size:12px;font-weight:700;fill:#536075}.card,.row{fill:#f8fafc;stroke:#dce3ec}.track{fill:#e7edf5}.bar{fill:#2563eb}.cyan{fill:#0891b2}.purple{fill:#7c3aed}.amber{fill:#d97706}</style><rect width="1200" height="580" fill="#fff"/><text class="title" x="40" y="48">Component effect deltas</text><text class="sub" x="40" y="77">Legend · positive = better · each row uses its own outcome scale</text><rect class="row" x="40" y="112" width="1120" height="105" rx="16"/><text class="label" x="64" y="146">Self-authored grounding</text><text class="value" x="64" y="188">+0.94</text><text class="meta" x="150" y="188">faithfulness delta</text><text class="meta" x="380" y="146">evidence · controlled local-model component</text><text class="status" x="380" y="192">status · qualified component result</text><rect class="track" x="820" y="160" width="300" height="12" rx="6"/><rect class="bar" x="820" y="160" width="270" height="12" rx="6"/><text class="meta" x="820" y="194">positive measured change · independent scale</text><rect class="row" x="40" y="237" width="1120" height="105" rx="16"/><text class="label" x="64" y="271">SQuAD-2.0 grounding</text><text class="value" x="64" y="313">+0.63</text><text class="meta" x="150" y="313">faithfulness delta</text><text class="meta" x="380" y="271">evidence · controlled local-model component</text><text class="status" x="380" y="317">status · qualified component result</text><rect class="track" x="820" y="285" width="300" height="12" rx="6"/><rect class="cyan" x="820" y="285" width="270" height="12" rx="6"/><text class="meta" x="820" y="319">positive measured change · independent scale</text><rect class="row" x="40" y="362" width="1120" height="105" rx="16"/><text class="label" x="64" y="396">Recall correction pass</text><text class="value" x="64" y="438">+0.00</text><text class="meta" x="150" y="438">correction-pass delta</text><text class="meta" x="380" y="396">evidence · local-live retrieval component</text><text class="status" x="380" y="442">status · UNCHANGED</text><rect class="track" x="820" y="410" width="300" height="12" rx="6"/><rect class="purple" x="820" y="410" width="3" height="12" rx="6"/><text class="meta" x="820" y="444">no measured change · independent scale</text><text class="footer" x="40" y="520">Independent scales · not comparable / not aggregatable · no average or ranking</text></svg>
