<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="570" viewBox="0 0 1200 570" role="img" aria-labelledby="title desc"><title id="title">Component effect deltas</title><desc id="desc">Three independent small-multiple panels. Each panel has its own scale; values are not comparable or aggregatable.</desc><style>text{font-family:Inter,ui-sans-serif,system-ui,-apple-system,sans-serif;fill:#172033}.title{font-size:28px;font-weight:760}.sub{font-size:14px;fill:#536075}.label{font-size:17px;font-weight:700}.value{font-size:25px;font-weight:780}.meta{font-size:12px;fill:#536075}.status{font-size:12px;font-weight:700}.card{fill:#f8fafc;stroke:#dce3ec}.track{fill:#e7edf5}.bar{fill:#2563eb}.cyan{fill:#0891b2}.amber{fill:#d97706}</style><rect width="1200" height="570" fill="#fff"/><text class="title" x="40" y="48">Component effect deltas</text><text class="sub" x="40" y="77">Independent panels by outcome and evidence class · no shared performance axis</text><rect class="card" x="40" y="125" width="350" height="355" rx="16"/><text class="label" x="62" y="163">Self-authored grounding</text><text class="value" x="62" y="205">+0.94 faithfulness delta</text><line x1="85" y1="380" x2="345" y2="380" stroke="#94a3b8"/><rect class="bar" x="170" y="225" width="90" height="155" rx="7"/><text class="meta" x="62" y="414">outcome: faithfulness delta</text><text class="meta" x="62" y="434">evidence: controlled local-model component</text><text class="meta" x="62" y="454">denominator: n/a (signed delta)</text><text class="status" x="62" y="474">status: qualified component result</text><rect class="card" x="420" y="125" width="350" height="355" rx="16"/><text class="label" x="442" y="163">SQuAD-2.0 grounding</text><text class="value" x="442" y="205">+0.63 faithfulness delta</text><line x1="465" y1="380" x2="725" y2="380" stroke="#94a3b8"/><rect class="bar" x="550" y="225" width="90" height="155" rx="7"/><text class="meta" x="442" y="414">outcome: faithfulness delta</text><text class="meta" x="442" y="434">evidence: controlled local-model component</text><text class="meta" x="442" y="454">denominator: n/a (signed delta)</text><text class="status" x="442" y="474">status: qualified component result</text><rect class="card" x="800" y="125" width="350" height="355" rx="16"/><text class="label" x="822" y="163">Recall correction pass</text><text class="value" x="822" y="205">+0.00 correction-pass delta</text><line x1="845" y1="380" x2="1105" y2="380" stroke="#94a3b8"/><rect class="bar" x="930" y="377" width="90" height="3" rx="7"/><text class="meta" x="822" y="414">outcome: correction-pass delta</text><text class="meta" x="822" y="434">evidence: local-live retrieval component</text><text class="meta" x="822" y="454">denominator: n/a (signed delta)</text><text class="status" x="822" y="474">status: UNCHANGED</text><text class="status" x="40" y="530">Independent panel scales · not comparable / not aggregatable · no average or ranking</text></svg>
