name: ci

# Workspace-wide gate: every push/PR must keep lint + build + test green
# across all packages/* and apps/*. The harness suite has its own
# path-filtered workflow (harness.yml); this one guards the main tree.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm lint:comments
      # Deterministic drift guards (no Ollama): the identity single-source seam
      # and the secret-persistence guard coverage. self-eval runs check:prompt-seam
      # locally each loop; check:secret-guard-coverage had only its own unit test —
      # neither runs on a HUMAN PR, which bypasses self-eval. CI must enforce both
      # so a hardcoded-identity string or an unguarded write tool can't merge.
      - run: pnpm check:prompt-seam
      - run: pnpm check:secret-guard-coverage
      # The build runs on TypeScript 7 (native) while the `typescript` MODULE stays
      # on the 6.0 API for typescript-eslint / knip (TS7.0 ships no compiler API).
      # A dependency bump could silently undo that split — a `tsc` that resolves to
      # 6 hands back the slow build, a `typescript` that resolves to 7 crashes lint.
      - run: pnpm check:toolchain
      - run: pnpm check
  check-windows:
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
  check-browser:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @muse/web exec playwright install chromium --with-deps
      - run: pnpm --filter @muse/web test:browser
